name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  IMAGE_PREFIX: ghcr.io/geoffreycoulaud/emule-indexer

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup — uv + sync
        uses: ./.github/actions/setup-uv-env

      # --- lint ---
      - name: Lint — ruff check
        run: uv run ruff check .
      - name: Lint — ruff format
        run: uv run ruff format --check .
      - name: Lint — mypy
        run: uv run mypy
      - name: Lint — sqlfluff (migrations SQL)
        run: uv run sqlfluff lint packages/crawler/src
      - name: Lint — templates webui
        run: uv run python -m catalog_webui._dev.check_templates packages/webui/src/catalog_webui/adapters/templates

      # --- unit (fail-fast : stoppe au 1er paquet rouge) ---
      - name: Tests unitaires — matching
        run: ( cd packages/matching && uv run pytest )
      - name: Tests unitaires — crawler
        run: ( cd packages/crawler  && uv run pytest )
      - name: Tests unitaires — verifier
        run: ( cd packages/verifier && uv run pytest )
      - name: Tests unitaires — webui
        run: ( cd packages/webui    && uv run pytest )

      # --- build (amd64, --load local, cache gha) : 3 images taguées ci-<sha> ---
      - name: Setup — buildx
        uses: docker/setup-buildx-action@v3
      - name: Build — image crawler (amd64)
        uses: ./.github/actions/docker-image
        with:
          package: crawler
          push: 'false'
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}-crawler:ci-${{ github.sha }}
      - name: Build — image verifier (amd64)
        uses: ./.github/actions/docker-image
        with:
          package: verifier
          push: 'false'
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}-verifier:ci-${{ github.sha }}
      - name: Build — image webui (amd64)
        uses: ./.github/actions/docker-image
        with:
          package: webui
          push: 'false'
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}-webui:ci-${{ github.sha }}

      # --- integration (compose smoke consomme les images ci-<sha>) ---
      - name: Intégration — stack compose (smoke)
        run: ( cd packages/crawler && uv run pytest -m compose_integration --no-cov -q )
        env:
          IMAGE_TAG: ci-${{ github.sha }}

  publish:
    needs: pipeline
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup — QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup — buildx
        uses: docker/setup-buildx-action@v3
      - name: Login — ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags — crawler
        id: meta-crawler
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-crawler
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Publish — image crawler (amd64+arm64)
        uses: ./.github/actions/docker-image
        with:
          package: crawler
          push: 'true'
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-crawler.outputs.tags }}

      - name: Tags — verifier
        id: meta-verifier
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-verifier
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Publish — image verifier (amd64+arm64)
        uses: ./.github/actions/docker-image
        with:
          package: verifier
          push: 'true'
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-verifier.outputs.tags }}

      - name: Tags — webui
        id: meta-webui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-webui
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Publish — image webui (amd64+arm64)
        uses: ./.github/actions/docker-image
        with:
          package: webui
          push: 'true'
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-webui.outputs.tags }}
