[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
emule-indexer = { workspace = true }
download-verifier = { workspace = true }
catalog-matching = { workspace = true }

[dependency-groups]
dev = [
  "emule-indexer",
  "download-verifier",
  "catalog-matching",
  "pytest>=8",
  "pytest-cov>=5",
  "pytest-asyncio>=1.2",
  "mypy>=1.10",
  "ruff>=0.5",
  "sqlfluff>=3.0",
  "testcontainers>=4.10",
  "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
src = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/matching/src",
  "packages/matching/tests",
  "packages/verifier/src",
  "packages/verifier/tests",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
# Stratégie de résolution des noms de modules dans le workspace :
# - `packages/crawler/tests/` a un `__init__.py` (imports `from tests.…` internes) → paquet `tests`
# - `packages/verifier/tests/` et `packages/matching/tests/` n'ont PAS de `__init__.py`.
# Pour éviter la collision entre verifier et matching sur les noms de fichiers (ex. `test_config`),
# les tests matching sont couverts via mypy par-paquet (`cd packages/matching && uv run mypy`).
# Le scan racine inclut seulement les tests du crawler (avec __init__.py) + verifier (sans).
files = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/matching/src",
  "packages/verifier/src",
  "packages/verifier/tests",
]

[[tool.mypy.overrides]]
module = "re2"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pyseccomp"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "testcontainers.*"
ignore_missing_imports = true
